name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - development
          - production

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📱 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Run Expo Doctor
        run: npx expo-doctor

      - name: 🏗️ EAS Build (Android APK)
        run: eas build --platform android --profile ${{ github.event.inputs.build_type || 'preview' }} --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Download APK
        run: |
          BUILD_ID=$(eas build:list --platform android --limit 1 --json | jq -r '.[0].id')
          if [ -n "$BUILD_ID" ]; then
            eas build:download --id "$BUILD_ID" --output dakkho-student.apk
            echo "APK downloaded: dakkho-student.apk"
            ls -lh dakkho-student.apk
          fi

      - name: 📤 Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dakkho-student-apk
          path: dakkho-student.apk
          retention-days: 30
