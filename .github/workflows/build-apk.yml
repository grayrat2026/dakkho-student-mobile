name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🍞 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📥 Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: 🩺 Health Check
        run: npx expo-doctor

      - name: 🏗️ Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: 🔨 Build Debug APK (faster)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -30

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dakkho-student-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: 📋 Build Info
        if: always()
        run: |
          echo "=== APK Files ==="
          find android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "No APK found"
          echo "=== Gradle Summary ==="
          cat android/app/build/reports/build-result.txt 2>/dev/null || echo "No build report"
