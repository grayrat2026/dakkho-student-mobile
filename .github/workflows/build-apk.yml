name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🍞 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: 🤖 Setup Android SDK & Build Tools
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          
          # Install cmdline-tools if not present
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            mkdir -p "$ANDROID_HOME/cmdline-tools"
            cd /tmp
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdlinetools.zip
            unzip -q cmdlinetools.zip -d "$ANDROID_HOME/cmdline-tools"
            mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest" 2>/dev/null || true
            rm cmdlinetools.zip
          fi
          
          # Accept licenses and install required packages
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" 2>/dev/null
          
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: 📥 Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: 🩺 Health Check
        run: npx expo-doctor

      - name: 🏗️ Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: 🔨 Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          echo "Starting Gradle build..."
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dakkho-student-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: 📋 Build Info
        if: always()
        run: |
          echo "=== APK Files ==="
          find android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "No APK found"
